name: careapp_mobile
description: CareApp - Unified Healthcare Service Platform
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Networking
  http: ^1.2.1
  socket_io_client: ^2.0.3
  
  # Storage
  shared_preferences: ^2.2.3
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Image
  image_picker: ^1.0.7
  
  # Maps & Location
  geolocator: ^12.0.0
  google_maps_flutter: ^2.6.1
  
  # Utilities
  intl: ^0.19.0
  provider: ^6.1.1
  cached_network_image: ^3.3.1
  
  # Charts
  fl_chart: ^0.68.0
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Calls
  agora_rtc_engine: ^6.3.0
  permission_handler: ^11.3.0

  url_launcher: ^6.3.1

  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/health.jpg
    